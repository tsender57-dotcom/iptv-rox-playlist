name: CenterStrm Updater

on:
  workflow_dispatch: # Memungkinkan tombol 'Run workflow' manual

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright httpx[http2] pytz
          playwright install --with-deps
          playwright install chromium

      - name: Run scraper
        env:
          CENTERSTRM_API: ${{ secrets.CENTERSTRM_API }} # Mengambil API dari GitHub Secrets
        run: |
          echo "Starting StreamCenter scraper..."
          python centerstrm.py

      - name: Commit & Push safely
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Menjaring ekstensi M3U8 baru, sisa M3U lama, dan JSON untuk Cache
          git add *.m3u8 *.m3u *.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update CenterStrm playlist [skip ci]"

          # Push dengan aman jika ada konflik
          if ! git push origin main; then
            echo "Push rejected — rebasing safely..."
            git stash
            git pull --rebase origin main
            git stash pop
            # Pastikan file yang ditambahkan saat rebase juga memakai format baru
            git add *.m3u8 *.m3u *.json
            git commit -m "Update CenterStrm playlist (rebased) [skip ci]" || true
            git push origin main
          fi
