name: Auto Update Playlists

on:
  schedule:
    - cron: '*/30 * * * *' # Berjalan otomatis setiap 30 menit
  workflow_dispatch: # Mengizinkan Anda menekan tombol "Run" manual

jobs:
  update-playlists:
    runs-on: ubuntu-latest

    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests bs4 playwright pytz
          playwright install --with-deps
          playwright install chromium
        
      - name: Run Roxiestreams Script
        run: python update_rox.py
        continue-on-error: true

      - name: Run Sharkstreams Script
        run: python update_shark.py
        continue-on-error: true

      - name: Run Watchfooty Script
        run: python update_watchfooty.py
        continue-on-error: true

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Tambahkan file Watchfooty ke dalam antrean penyimpanan
          git add Roxiestreams_VLC.m3u8 Roxiestreams_TiviMate.m3u8 Sharkstreams_VLC.m3u8 Sharkstreams_TiviMate.m3u8 Watchfooty_VLC.m3u8 Watchfooty_TiviMate.m3u8
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "Auto-update Roxie, Shark, & WFTY playlists"
          
          # Push dengan aman (Safe Push)
          if ! git push origin main; then
            echo "Push rejected — rebasing safely..."
            git stash
            git pull --rebase origin main
            git stash pop
            git add Roxiestreams_VLC.m3u8 Roxiestreams_TiviMate.m3u8 Sharkstreams_VLC.m3u8 Sharkstreams_TiviMate.m3u8 Watchfooty_VLC.m3u8 Watchfooty_TiviMate.m3u8
            git commit -m "Auto-update Roxie, Shark, & WFTY playlists (rebased)" || true
            git push origin main
          fi
