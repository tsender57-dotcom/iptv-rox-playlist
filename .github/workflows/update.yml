name: Auto Update Playlist

on:
  schedule:
    - cron: '*/30 * * * *' # Script akan berjalan otomatis setiap 30 menit
  workflow_dispatch: # Mengizinkan Anda menekan tombol "Run" manual

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    # Memberikan izin kepada bot untuk menulis file ke repository
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests bs4 playwright pytz
          playwright install --with-deps
          playwright install chromium
        
      - name: Run script to fetch M3U8
        run: python update_rox.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Roxiestreams_VLC.m3u8 Roxiestreams_TiviMate.m3u8
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "Auto-update Roxiestreams playlist"
          
          # Push dengan aman (Safe Push)
          if ! git push origin main; then
            echo "Push rejected — rebasing safely..."
            git stash
            git pull --rebase origin main
            git stash pop
            git add Roxiestreams_VLC.m3u8 Roxiestreams_TiviMate.m3u8
            git commit -m "Auto-update Roxiestreams playlist (rebased)" || true
            git push origin main
          fi
